<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME OVER</title>

    <!-- conecta el archivo de estilos externo (style.css) -->
    <link rel="stylesheet" href="style.css">

    <style>

        /* fija el canvas al fondo de la pantalla, detrás de todo el contenido */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0; /* queda debajo de .contenido (z-index: 1) */
        }

        /* agrupa el título y textos, los apila en columna y los centra */
        .contenido {
            position: relative;
            z-index: 1;            /* se muestra encima del canvas */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;             /* espacio uniforme entre cada hijo */
            text-align: center;
        }

        /* título principal: fuente personalizada, brillo rojo neón, aparece animado */
        .titulo-derrota {
            font-family: 'Ethnocentric', monospace;
            font-size: 90px;
            color: white;
            text-shadow: 0 0 20px #e8002d, 0 0 60px #e8002d; /* doble halo rojo */
            opacity: 0;                                        /* empieza invisible */
            animation: aparecer 1s ease-out 0.5s forwards;    /* aparece 0.5s después de cargar */
        }

        /* subtítulo: más pequeño, rojo, aparece 0.7s después que el título */
        .subtitulo {
            font-family: 'Ethnocentric', monospace;
            font-size: 18px;
            color: #e8002d;
            letter-spacing: 6px;
            opacity: 0;
            animation: aparecer 1s ease-out 1.2s forwards; /* delay mayor que el título */
        }

        /* texto de instrucción: aparece al final y parpadea indefinidamente */
        .click-texto {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #888;           /* gris apagado para no competir con el título */
            letter-spacing: 4px;
            opacity: 0;
            /* dos animaciones combinadas: primero aparece, luego parpadea para siempre */
            animation: aparecer 1s ease-out 2s forwards, parpadear 1.5s ease-in-out 2s infinite;
            cursor: pointer;
        }

        /* animación de entrada: los elementos suben desde abajo mientras aparecen */
        @keyframes aparecer {
            0%   { opacity: 0; transform: translateY(20px); } /* abajo e invisible */
            100% { opacity: 1; transform: translateY(0); }    /* posición normal y visible */
        }

        /* animación de parpadeo: alterna entre visible y casi invisible */
        @keyframes parpadear {
            0%, 100% { opacity: 1; }    /* visible en los extremos del ciclo */
            50%       { opacity: 0.2; } /* casi invisible en el punto medio */
        }

        /* capa de destello rojo que cubre toda la pantalla al cargar la página */
        .flash {
            position: fixed;
            inset: 0;              /* equivale a top/right/bottom/left: 0 a la vez */
            background: #e8002d;
            z-index: 99;           /* encima de todo, incluyendo el contenido */
            animation: flash 0.6s ease-out forwards; /* más rápido que la victoria (0.8s) */
            pointer-events: none;  /* no bloquea los clicks del usuario */
        }

        /* animación del flash: desaparece desde completamente opaco a invisible */
        @keyframes flash {
            0%   { opacity: 1; }   /* arranca en opacidad total (más agresivo que victoria) */
            100% { opacity: 0; }
        }

        /* línea decorativa horizontal debajo del título, aparece entre título y subtítulo */
        .linea {
            width: 80px;
            height: 3px;
            background: #e8002d;
            box-shadow: 0 0 10px #e8002d; /* brillo rojo que combina con el título */
            opacity: 0;
            animation: aparecer 1s ease-out 1s forwards; /* aparece entre título (0.5s) y subtítulo (1.2s) */
        }

    </style>
</head>
<body>

    <!-- capa del destello rojo, se muestra al entrar y desaparece sola -->
    <div class="flash"></div>

    <!-- lienzo para el efecto matrix de caracteres cayendo -->
    <canvas id="canvas"></canvas>

    <!-- contenedor principal: al hacer click vuelve al juego para reintentar -->
    <div class="contenido" onclick="window.location.href='juegopro.html'">
        <h1 class="titulo-derrota">GAME OVER</h1>
        <div class="linea"></div>                        <!-- separador decorativo -->
        <p class="subtitulo">EL SISTEMA TE HA ELIMINADO</p>
        <p class="click-texto">[ CLICK PARA REINTENTAR ]</p>
    </div>

    <script>

        // agarra el elemento canvas del HTML por su id
        const canvas = document.getElementById("canvas");

        // obtiene el contexto 2D, necesario para poder dibujar dentro del canvas
        const ctx = canvas.getContext("2d");

        // ajusta el canvas para que cubra exactamente toda la ventana del navegador
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // string con el alfabeto cirílico (ruso) usado como caracteres del efecto
        const letters = "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюя";

        // convierte el string en array para poder elegir caracteres individuales al azar
        const lettersArray = letters.split("");

        // tamaño de cada carácter en píxeles (también define el ancho de cada columna)
        const fontSize = 16;

        // calcula cuántas columnas caben en el ancho total de la pantalla
        const columns = canvas.width / fontSize;

        // array que guarda la posición Y (fila) actual de cada columna
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = 1; } // todas empiezan en la fila 1

        // dibuja un frame del efecto matrix y actualiza las posiciones
        function draw() {

            // rectángulo negro semitransparente que cubre todo el canvas
            // la baja opacidad (0.05) crea la estela: los caracteres se desvanecen gradualmente
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // color rojo para los caracteres, consistente con la paleta de game over
            ctx.fillStyle = "#e8002d";
            ctx.font = fontSize + "px monospace";

            // recorre cada columna y dibuja un carácter aleatorio en su posición actual
            for (let i = 0; i < drops.length; i++) {
                const text = lettersArray[Math.floor(Math.random() * lettersArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // cuando la gota llega al fondo, tiene 2.5% de probabilidad de reiniciarse
                // el valor aleatorio evita que todas las columnas se reseteen a la vez
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }

                // baja la gota una fila hacia abajo en cada frame
                drops[i]++;
            }
        }

        // ejecuta draw() cada 30ms (~33 fps), generando la animación continua
        setInterval(draw, 30);

        // si el usuario redimensiona la ventana, el canvas se ajusta para seguir llenando la pantalla
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>

</body>
</html>
