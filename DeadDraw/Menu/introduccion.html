Pantalla de introducción narrativa antes de iniciar el juego.
Muestra texto automáticamente, permite omitir la intro y redirige al juego.
Incluye un fondo animado tipo Matrix.
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Permite que la página se adapte a distintos tamaños de pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título de la pestaña -->
    <title>DEAD DRAW — PROTOCOLO INICIADO</title>

    <!-- Archivo de estilos -->
    <link rel="stylesheet" href="introduccion.css">
</head>

<body>

    <!-- Canvas utilizado para dibujar el fondo animado -->
    <canvas id="canvas"></canvas>

    <!-- Capa utilizada para el efecto de transición (fade) -->
    <div id="fade-overlay"></div>

    <!-- Contenedor principal de la interfaz -->
    <div id="intro-wrapper">

        <!-- Contenedor del texto narrativo -->
        <div id="slide-box">

            <!-- Título del slide -->
            <div id="slide-label"></div>

            <!-- Texto principal -->
            <div id="slide-text"></div>

        </div>

        <!-- Barra de progreso (actualmente no se usa) -->
        <div id="progress-bar-wrap">
            <div id="progress-bar"></div>
        </div>

        <!-- Controles -->
        <div id="controls">

            <!-- Botón para omitir la introducción -->
            <button class="btn-intro" id="btn-skip">[ OMITIR ]</button>

        </div>

    </div>

    <script>
    /* Contenido de los slides */
    let s = [
        ["// BIENVENIDO","Bienvenido a La Red Muerta..."],
        ["// CONTEXTO","Dos facciones controlan todo..."],
        ["// TU ROL","Eres un operador independiente..."],
        ["// EL PROTOCOLO","Cada run es una nueva entrada..."],
        ["// ADVERTENCIA","Dead Draw no es solo un sistema..."]
    ];

    /* Índice del slide actual */
    let i = 0;

    /* Muestra los slides automáticamente */
    function mostrar(){
        document.getElementById("slide-label").textContent = s[i][0];
        document.getElementById("slide-text").textContent = s[i][1];

        i++;

        if(i < s.length){
            setTimeout(mostrar, 2000);
        } else {
            setTimeout(ir, 1000);
        }
    }

    /* Redirige al juego */
    function ir(){
        location.href = "../game/game_view.html";
    }

    /* Permite omitir la introducción */
    document.getElementById("btn-skip").onclick = ir;

    /* Inicia la secuencia */
    mostrar();

</script>

</body>
</html>
