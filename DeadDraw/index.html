<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAD DRAW</title>
    <link rel="stylesheet" href="style.css">
    <style>
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
<div class="contenido">
    <h1>
        <span class="letra">D</span>
        <span class="letra">E</span>
        <span class="letra">A</span>
        <span class="letra">D</span>
        <span class="espacio"> </span>
        <span class="letra">D</span>
        <span class="letra">R</span>
        <span class="letra">A</span>
        <span class="letra">W</span>
    </h1>

    <a href="../DeadDraw/game/game_view.html">
        <div class="btn">
            <span>PLAY</span>
        </div>
    </a>

    <a href="../DeadDraw/Menu/mecanicas.html">
        <div class="btn">
            <span>MECANICAS</span>
        </div>
    </a>

    <a href="../DeadDraw/Menu/Historia.html">
        <div class="btn">
            <span>HISTORIA</span>
        </div>
    </a>

    <a href="../DeadDraw/Menu/tutorial.html">
        <div class="btn">
            <span>TUTORIAL</span>
        </div>
    </a>
</div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "袗袘袙袚袛袝袞袟袠袡袣袥袦袧袨袩袪小孝校肖啸笑效楔些歇蝎鞋协挟携邪斜胁谐写械卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟";
        const lettersArray = letters.split("");

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#e8002d";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = lettersArray[Math.floor(Math.random() * lettersArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 30);

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
