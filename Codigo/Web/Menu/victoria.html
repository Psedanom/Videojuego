<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICTORIA</title>

    <!-- esta linea conecta el archivo de estilos -->
    <link rel="stylesheet" href="style.css">

    <style>

        /* esta funcion pone el canvas fijo en el fondo de toda la pantalla */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* esta funcion pone el titulo y el texto encima del canvas */
        .contenido {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            text-align: center;
        }

        /* esta funcion le da estilo al titulo con brillo azul y lo hace aparecer */
        .titulo-victoria {
            font-family: 'Ethnocentric', monospace;
            font-size: 90px;
            color: white;
            text-shadow: 0 0 20px #00e5ff, 0 0 60px #00e5ff;
            opacity: 0;
            animation: subir 1s ease-out 0.5s forwards;
        }

        /* esta funcion le da estilo al subtitulo y lo hace aparecer despues del titulo */
        .subtitulo {
            font-family: 'Ethnocentric', monospace;
            font-size: 18px;
            color: #00e5ff;
            letter-spacing: 6px;
            opacity: 0;
            animation: subir 1s ease-out 1.2s forwards;
        }

        /* esta funcion hace que el texto de click parpadee */
        .click-texto {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #888;
            letter-spacing: 4px;
            opacity: 0;
            animation: subir 1s ease-out 2s forwards, parpadear 1.5s ease-in-out 2s infinite;
            cursor: pointer;
        }

        /* esta funcion define como aparecen los elementos de abajo hacia arriba */
        @keyframes subir {
            0%   { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* esta funcion hace que el texto de click parpadee */
        @keyframes parpadear {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* esta funcion crea el flash azul que aparece al cargar la pagina */
        .flash {
            position: fixed;
            inset: 0;
            background: #00e5ff;
            z-index: 99;
            animation: flash 0.8s ease-out forwards;
            pointer-events: none;
        }

        /* esta funcion define como desaparece el flash */
        @keyframes flash {
            0%   { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* esta funcion dibuja la linea decorativa debajo del titulo */
        .linea {
            width: 80px;
            height: 3px;
            background: #00e5ff;
            box-shadow: 0 0 10px #00e5ff;
            opacity: 0;
            animation: subir 1s ease-out 1s forwards;
        }

    </style>
</head>
<body>

    <!-- esta es la capa del flash azul que aparece al entrar -->
    <div class="flash"></div>

    <!-- este es el lienzo donde se dibuja el efecto matrix -->
    <canvas id="canvas"></canvas>

    <!-- este div agrupa el titulo y los textos, y al hacer click va al juego -->
    <div class="contenido" onclick="window.location.href='game_view.html'">
        <h1 class="titulo-victoria">VICTORIA</h1>
        <div class="linea"></div>
        <p class="subtitulo">EL SISTEMA HA SIDO DERROTADO</p>
        <p class="click-texto">[ CLICK PARA CONTINUAR ]</p>
    </div>

    <script>

        // esta linea agarra el canvas del HTML
        const canvas = document.getElementById("canvas");

        // esta linea crea el pincel para dibujar en 2D
        const ctx = canvas.getContext("2d");

        // estas lineas hacen que el canvas ocupe toda la pantalla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // estos son los caracteres rusos que van a caer
        const letters = "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюя";
        const lettersArray = letters.split("");

        // estas variables definen el tamano de letra y cuantas columnas caben
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        // esta variable guarda en que posicion vertical va cada columna
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = 1; }

        // esta funcion dibuja un frame del efecto matrix
        function draw() {

            // esta linea pinta el fondo semitransparente para crear la estela
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // esta linea pone el color azul en los caracteres
            ctx.fillStyle = "#00e5ff";
            ctx.font = fontSize + "px monospace";

            // este ciclo recorre cada columna y dibuja un caracter
            for (let i = 0; i < drops.length; i++) {
                const text = lettersArray[Math.floor(Math.random() * lettersArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // esta condicion reinicia la gota cuando llega al fondo
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }

        // esta linea ejecuta el dibujo cada 30 milisegundos
        setInterval(draw, 30);

        // esta funcion ajusta el canvas si se cambia el tamano de la ventana
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>

</body>
</html>
